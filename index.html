<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Rápido de Conducta</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }
      .transition-all {
        transition: all 0.2s ease-in-out;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-800 p-2 pb-20 sm:p-6">
    <!-- Encabezado -->
    <header class="max-w-md mx-auto mb-6 mt-4 text-center">
      <h1
        class="text-2xl font-bold text-gray-900 flex items-center justify-center gap-2"
      >
        <i data-lucide="activity" class="text-blue-600"></i>
        Registro Rápido
      </h1>
      <p class="text-sm text-gray-500 mt-1">Captura de conducta inmediata</p>
    </header>

    <main
      class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden transition-all"
    >
      <!-- Toggle Historial / Registro -->
      <div class="flex border-b border-gray-100">
        <button
          id="btn-nuevo"
          class="flex-1 py-3 text-sm font-medium transition-colors text-blue-600 border-b-2 border-blue-600 bg-blue-50/30"
        >
          Nuevo Registro
        </button>
        <button
          id="btn-historial"
          class="flex-1 py-3 text-sm font-medium transition-colors text-gray-500 hover:bg-gray-50 flex items-center justify-center gap-2"
        >
          <i data-lucide="history" size="16"></i>
          Historial
          <span
            id="count-badge"
            class="bg-gray-100 px-2 py-0.5 rounded-full text-xs"
            >0</span
          >
        </button>
      </div>

      <!-- VISTA FORMULARIO -->
      <div id="view-form" class="p-5 sm:p-6 space-y-6">
        <!-- 1. Conducta -->
        <section>
          <label
            class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"
          >
            <i data-lucide="activity" size="16" class="text-gray-400"></i>
            Conducta
          </label>
          <input
            type="text"
            id="input-conducta"
            value="Rasguñarse los dedos"
            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-gray-700"
          />
        </section>

        <!-- 2. Antecedente -->
        <section>
          <label
            class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"
          >
            <i data-lucide="alert-circle" size="16" class="text-gray-400"></i>
            Antecedente
            <span class="text-xs font-normal text-gray-400"
              >(¿Qué pasó antes?)</span
            >
          </label>
          <div id="grid-antecedentes" class="flex flex-wrap gap-2">
            <!-- Botones inyectados por JS -->
          </div>

          <input
            type="text"
            id="input-otro-antecedente"
            placeholder="Escribe el antecedente aquí..."
            class="hidden w-full mt-3 bg-white border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-sm"
          />
        </section>

        <!-- 3. Tiempo de Duración -->
        <section>
          <label
            class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"
          >
            <i data-lucide="clock" size="16" class="text-gray-400"></i>
            Tiempo de duración
          </label>
          <div id="grid-tiempos" class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            <!-- Botones inyectados por JS -->
          </div>
        </section>

        <!-- 4. Frecuencia -->
        <section>
          <label
            class="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"
          >
            <i data-lucide="hash" size="16" class="text-gray-400"></i>
            Frecuencia
            <span class="text-xs font-normal text-gray-400"
              >(Veces en este episodio)</span
            >
          </label>
          <div
            class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-xl p-2"
          >
            <button
              id="btn-minus"
              class="w-12 h-12 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-100 active:bg-gray-200 text-xl font-bold shadow-sm"
            >
              -
            </button>
            <span
              id="display-frecuencia"
              class="text-3xl font-bold text-gray-800 w-16 text-center"
              >1</span
            >
            <button
              id="btn-plus"
              class="w-12 h-12 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-100 active:bg-gray-200 text-xl font-bold shadow-sm"
            >
              +
            </button>
          </div>
        </section>

        <!-- Botón Guardar -->
        <div class="pt-4">
          <button
            id="btn-guardar"
            class="w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all bg-gray-900 text-white hover:bg-gray-800 shadow-xl shadow-gray-200 active:scale-[0.98]"
          >
            <i data-lucide="save" id="icon-save" size="20"></i>
            <span id="text-save">Guardar Registro</span>
          </button>
        </div>
      </div>

      <!-- VISTA HISTORIAL -->
      <div id="view-history" class="hidden p-0 bg-gray-50 min-h-[400px]">
        <div
          id="history-header"
          class="flex justify-between items-center p-3 border-b border-gray-200 bg-white"
        >
          <button
            id="btn-exportar"
            class="text-xs text-green-700 flex items-center gap-1 px-3 py-2 hover:bg-green-50 rounded-md transition font-semibold border border-green-200 shadow-sm"
          >
            <i data-lucide="download" size="14"></i> Exportar a Excel
          </button>
          <button
            id="btn-limpiar"
            class="text-xs text-red-500 flex items-center gap-1 px-2 py-2 hover:bg-red-50 rounded-md transition"
          >
            <i data-lucide="trash-2" size="14"></i> Borrar Todo
          </button>
        </div>

        <div
          id="empty-state"
          class="flex flex-col items-center justify-center h-64 text-gray-400 px-6 text-center"
        >
          <i data-lucide="activity" size="48" class="mb-4 opacity-20"></i>
          <p>No hay registros aún.</p>
          <p class="text-sm mt-1">Tus capturas aparecerán aquí.</p>
        </div>

        <div id="list-registros" class="divide-y divide-gray-100 bg-white">
          <!-- Registros inyectados por JS -->
        </div>
      </div>
    </main>

    <script>
      // --- CONFIGURACIÓN ---
      const GOOGLE_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxa43UT868Pah4wWH4miBZzObcONUOTbt5QvQs6omy3wAmloHhZLdEl_PZ8s0JWSb8f0Q/exec";

      // --- ESTADO ---
      let registros =
        JSON.parse(localStorage.getItem("registrosConducta")) || [];
      let antecedenteSeleccionado = "";
      let tiempoSeleccionado = "";
      let frecuencia = 1;

      const opcionesAntecedentes = [
        "Ansiedad",
        "Aburrimiento",
        "Estrés",
        "Viendo TV",
        "Trabajando/Estudiando",
        "Otro",
      ];
      const opcionesTiempo = ["< 1 min", "1 - 3 min", "3 - 5 min", "> 5 min"];

      // --- SELECTORES ---
      const btnNuevo = document.getElementById("btn-nuevo");
      const btnHistorial = document.getElementById("btn-historial");
      const viewForm = document.getElementById("view-form");
      const viewHistory = document.getElementById("view-history");
      const gridAntecedentes = document.getElementById("grid-antecedentes");
      const gridTiempos = document.getElementById("grid-tiempos");
      const inputOtro = document.getElementById("input-otro-antecedente");
      const displayFrecuencia = document.getElementById("display-frecuencia");
      const countBadge = document.getElementById("count-badge");
      const listRegistros = document.getElementById("list-registros");
      const emptyState = document.getElementById("empty-state");
      const btnGuardar = document.getElementById("btn-guardar");
      const iconSave = document.getElementById("icon-save");
      const textSave = document.getElementById("text-save");

      // --- INICIALIZACIÓN ---
      function init() {
        renderOptions();
        renderHistory();
        lucide.createIcons(); // Inicializa los iconos de Lucide
      }

      // Renderizar opciones de botones
      function renderOptions() {
        // Antecedentes
        gridAntecedentes.innerHTML = opcionesAntecedentes
          .map(
            (opc) => `
                <button type="button" onclick="seleccionarAntecedente('${opc}')" data-ant="${opc}"
                    class="btn-ant px-3 py-2 rounded-lg text-sm border transition-all bg-white border-gray-200 text-gray-600 hover:border-blue-300 hover:bg-blue-50">
                    ${opc}
                </button>
            `,
          )
          .join("");

        // Tiempos
        gridTiempos.innerHTML = opcionesTiempo
          .map(
            (t) => `
                <button type="button" onclick="seleccionarTiempo('${t}')" data-time="${t}"
                    class="btn-time px-2 py-3 rounded-lg text-sm font-medium border transition-all bg-white border-gray-200 text-gray-600 hover:border-indigo-300 hover:bg-indigo-50">
                    ${t}
                </button>
            `,
          )
          .join("");
      }

      // --- LÓGICA DE UI ---
      btnNuevo.onclick = () => {
        viewForm.classList.remove("hidden");
        viewHistory.classList.add("hidden");
        btnNuevo.className =
          "flex-1 py-3 text-sm font-medium transition-colors text-blue-600 border-b-2 border-blue-600 bg-blue-50/30";
        btnHistorial.className =
          "flex-1 py-3 text-sm font-medium transition-colors text-gray-500 hover:bg-gray-50 flex items-center justify-center gap-2";
      };

      btnHistorial.onclick = () => {
        viewForm.classList.add("hidden");
        viewHistory.classList.remove("hidden");
        btnHistorial.className =
          "flex-1 py-3 text-sm font-medium transition-colors text-blue-600 border-b-2 border-blue-600 bg-blue-50/30 flex items-center justify-center gap-2";
        btnNuevo.className =
          "flex-1 py-3 text-sm font-medium transition-colors text-gray-500 hover:bg-gray-50";
        renderHistory();
      };

      window.seleccionarAntecedente = (val) => {
        antecedenteSeleccionado = val;
        document.querySelectorAll(".btn-ant").forEach((btn) => {
          const isActive = btn.getAttribute("data-ant") === val;
          btn.className = `btn-ant px-3 py-2 rounded-lg text-sm border transition-all ${
            isActive
              ? "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-200"
              : "bg-white border-gray-200 text-gray-600 hover:border-blue-300 hover:bg-blue-50"
          }`;
        });
        inputOtro.classList.toggle("hidden", val !== "Otro");
        if (val === "Otro") inputOtro.focus();
      };

      window.seleccionarTiempo = (val) => {
        tiempoSeleccionado = val;
        document.querySelectorAll(".btn-time").forEach((btn) => {
          const isActive = btn.getAttribute("data-time") === val;
          btn.className = `btn-time px-2 py-3 rounded-lg text-sm font-medium border transition-all ${
            isActive
              ? "bg-indigo-600 border-indigo-600 text-white shadow-md shadow-indigo-200"
              : "bg-white border-gray-200 text-gray-600 hover:border-indigo-300 hover:bg-indigo-50"
          }`;
        });
      };

      document.getElementById("btn-plus").onclick = () => {
        frecuencia++;
        displayFrecuencia.innerText = frecuencia;
      };

      document.getElementById("btn-minus").onclick = () => {
        if (frecuencia > 1) frecuencia--;
        displayFrecuencia.innerText = frecuencia;
      };

      // --- ACCIONES ---
      btnGuardar.onclick = async () => {
        const conducta = document.getElementById("input-conducta").value;
        const antFinal =
          antecedenteSeleccionado === "Otro"
            ? inputOtro.value
            : antecedenteSeleccionado;

        if (!antFinal) return alert("Selecciona un antecedente");
        if (!tiempoSeleccionado) return alert("Selecciona la duración");

        // UI Loading
        btnGuardar.disabled = true;
        textSave.innerText = "Enviando...";
        btnGuardar.className =
          "w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all bg-blue-400 text-white cursor-wait";

        const fechaActual = new Date().toLocaleString("es-ES", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });

        const nuevoRegistro = {
          id: Date.now(),
          fecha: fechaActual,
          conducta,
          antecedente: antFinal,
          tiempo: tiempoSeleccionado,
          frecuencia,
        };

        try {
          // Enviar a Google Sheets
          if (GOOGLE_SCRIPT_URL.includes("/exec")) {
            const formData = new URLSearchParams();
            formData.append("fecha", nuevoRegistro.fecha);
            formData.append("conducta", nuevoRegistro.conducta);
            formData.append("antecedente", nuevoRegistro.antecedente);
            formData.append("tiempo", nuevoRegistro.tiempo);
            formData.append("frecuencia", nuevoRegistro.frecuencia);

            console.log(formData);
            const response = await fetch(GOOGLE_SCRIPT_URL, {
              method: "POST",
              body: formData,
              mode: "no-cors",
            });
            console.log(response);
          } else {
            console.warn(
              "Falta configurar una URL válida de Google Apps Script terminada en /exec",
            );
          }

          // Guardar local
          registros = [nuevoRegistro, ...registros];
          localStorage.setItem("registrosConducta", JSON.stringify(registros));

          // Éxito UI
          textSave.innerText = "¡Guardado!";
          btnGuardar.className =
            "w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all bg-green-500 text-white shadow-lg shadow-green-200";

          setTimeout(() => {
            resetForm();
          }, 2000);
        } catch (error) {
          console.error(error);
          alert("Error al guardar en la nube, se guardó localmente.");
          registros = [nuevoRegistro, ...registros];
          localStorage.setItem("registrosConducta", JSON.stringify(registros));
          resetForm();
        }
      };

      function resetForm() {
        btnGuardar.disabled = false;
        textSave.innerText = "Guardar Registro";
        btnGuardar.className =
          "w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all bg-gray-900 text-white hover:bg-gray-800 shadow-xl shadow-gray-200";

        frecuencia = 1;
        displayFrecuencia.innerText = "1";
        antecedenteSeleccionado = "";
        tiempoSeleccionado = "";
        inputOtro.value = "";
        inputOtro.classList.add("hidden");
        renderOptions();
        renderHistory();
      }

      function renderHistory() {
        countBadge.innerText = registros.length;

        if (registros.length === 0) {
          emptyState.classList.remove("hidden");
          listRegistros.innerHTML = "";
          document.getElementById("history-header").classList.add("hidden");
          return;
        }

        emptyState.classList.add("hidden");
        document.getElementById("history-header").classList.remove("hidden");

        listRegistros.innerHTML = registros
          .map(
            (reg) => `
                <div class="p-4 bg-white hover:bg-gray-50 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-full">
                            ${reg.fecha}
                        </span>
                        <div class="flex items-center text-xs font-bold bg-gray-100 text-gray-600 px-2 py-1 rounded-full gap-1">
                            <i data-lucide="hash" size="12"></i> ${reg.frecuencia} ${reg.frecuencia === 1 ? "vez" : "veces"}
                        </div>
                    </div>
                    <h3 class="font-semibold text-gray-800 mb-1">${reg.conducta}</h3>
                    <div class="grid grid-cols-2 gap-2 mt-3">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Antecedente</span>
                            <span class="text-sm text-gray-700 flex items-center gap-1 mt-0.5">
                                <i data-lucide="alert-circle" size="12" class="text-gray-400"></i>
                                ${reg.antecedente}
                            </span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Duración</span>
                            <span class="text-sm text-gray-700 flex items-center gap-1 mt-0.5">
                                <i data-lucide="clock" size="12" class="text-gray-400"></i>
                                ${reg.tiempo}
                            </span>
                        </div>
                    </div>
                </div>
            `,
          )
          .join("");
        lucide.createIcons();
      }

      document.getElementById("btn-limpiar").onclick = () => {
        if (confirm("¿Seguro que quieres borrar todo?")) {
          registros = [];
          localStorage.removeItem("registrosConducta");
          renderHistory();
        }
      };

      document.getElementById("btn-exportar").onclick = () => {
        if (registros.length === 0) return alert("No hay datos");

        const cabeceras = [
          "Fecha",
          "Conducta",
          "Antecedente",
          "Duracion",
          "Frecuencia",
        ];
        const filas = registros.map((reg) => [
          `"${reg.fecha}"`,
          `"${reg.conducta}"`,
          `"${reg.antecedente}"`,
          `"${reg.tiempo}"`,
          reg.frecuencia,
        ]);

        const contenidoCSV =
          "\uFEFF" +
          [cabeceras.join(","), ...filas.map((fila) => fila.join(","))].join(
            "\n",
          );

        const blob = new Blob([contenidoCSV], {
          type: "text/csv;charset=utf-8;",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.setAttribute(
          "download",
          `Registros_Conducta_${new Date().toISOString().split("T")[0]}.csv`,
        );
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      init();
    </script>
  </body>
</html>
