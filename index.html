<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Protocolo de Registro Rápido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap");

      :root {
        --primary: #6366f1;
        --secondary: #4f46e5;
        --bg: #f8fafc;
        --card: #ffffff;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg);
        color: #1e293b;
        -webkit-tap-highlight-color: transparent;
      }

      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-option {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .btn-option:active {
        transform: scale(0.95);
      }

      .active-option {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      }

      .freq-btn {
        transition: all 0.15s ease;
      }

      .freq-btn:active {
        background-color: #e2e8f0;
        transform: scale(0.9);
      }

      /* Mic recording animation */
      .mic-active {
        animation: pulse-red 1.5s infinite;
        background-color: #fee2e2 !important;
        border-color: #ef4444 !important;
        color: #ef4444 !important;
      }

      @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }

      /* Custom animations */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: slideUp 0.4s ease-out forwards;
      }

      /* Hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Layout optimization for desktop */
      @media (min-width: 768px) {
        .main-container {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 2.5rem;
          align-items: start;
        }
        .submit-bar {
          position: relative;
          background: transparent;
          padding: 0;
          margin-top: 2rem;
          grid-column: span 2;
        }
        .full-width-section {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body
    class="safe-top safe-bottom min-h-screen flex flex-col items-center pb-12"
  >
    <!-- Hero / Header -->
    <header class="w-full max-w-5xl px-6 pt-10 pb-10 md:pt-16 md:pb-12">
      <div class="flex items-center justify-between">
        <div>
          <h1
            class="text-3xl md:text-5xl font-extrabold tracking-tight text-slate-900"
          >
            Registro
          </h1>
          <p class="text-slate-500 font-medium md:text-lg">
            Captura inmediata de conducta
          </p>
        </div>
        <div
          class="w-12 h-12 md:w-16 md:h-16 rounded-2xl md:rounded-3xl bg-indigo-50 flex items-center justify-center"
        >
          <i
            data-lucide="zap"
            class="text-indigo-600 w-6 h-6 md:w-8 md:h-8"
          ></i>
        </div>
      </div>
    </header>

    <main class="w-full max-w-5xl px-6 animate-fade-in">
      <div class="main-container">
        <!-- Izquierda: Datos -->
        <div class="space-y-8">
          <!-- Seccion Conducta -->
          <section class="space-y-3">
            <label
              class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1"
              >Conducta Observada</label
            >
            <div class="relative">
              <input
                type="text"
                id="input-conducta"
                value="Rasguñarse los dedos"
                class="w-full bg-white border border-slate-200 rounded-3xl px-6 py-5 text-lg font-semibold shadow-sm focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all"
              />
            </div>
          </section>

          <!-- Seccion Antecedente -->
          <section class="space-y-4">
            <div id="header-antecedentes" class="flex flex-col px-1">
              <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Antecedente (Disparador)</label>
            </div>
            
            <div
              id="grid-antecedentes"
              class="grid grid-cols-2 lg:grid-cols-3 gap-3"
            >
              <!-- Dinámico -->
            </div>
            
            <!-- Panel Grande: OTRO -->
            <div id="panel-otro" class="hidden flex-col gap-4 bg-white p-6 md:p-8 rounded-[2.5rem] md:rounded-[3rem] border-2 border-slate-100 shadow-sm transition-all relative">
              <div class="flex items-center justify-between">
                <label class="text-xs font-bold uppercase tracking-widest text-indigo-500">Describir o Dictar Antecedente</label>
                <button onclick="cerrarOtro()" class="text-xs font-bold text-slate-400 hover:text-slate-600 px-3 py-1.5 bg-slate-50 rounded-full transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-slate-200">
                  <i data-lucide="arrow-left" size="14"></i> Volver
                </button>
              </div>
              
              <textarea
                id="input-otro-antecedente"
                rows="3"
                placeholder="Escuchando o escribe aquí..."
                class="w-full bg-slate-50 border-0 rounded-2xl px-5 py-5 text-base md:text-lg font-medium outline-none focus:bg-indigo-50/30 focus:ring-4 focus:ring-indigo-50 transition-all resize-none shadow-inner"
              ></textarea>
              
              <div class="flex items-center justify-center mt-2">
                <button 
                  id="btn-mic-nativo" 
                  onclick="toggleDictado()"
                  class="flex items-center justify-center gap-3 px-8 py-4 rounded-[2rem] bg-slate-900 text-white font-bold transition-all hover:bg-slate-800 active:scale-95 shadow-xl w-full sm:w-auto"
                >
                  <i data-lucide="mic" size="20" id="mic-icon"></i>
                  <span id="mic-text">Toca para dictar</span>
                </button>
              </div>
            </div>
          </section>

          <!-- Seccion Duracion -->
          <section class="space-y-4">
            <label
              class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1"
              >Duración del Episodio</label
            >
            <div id="grid-tiempos" class="grid grid-cols-2 gap-3">
              <!-- Dinámico -->
            </div>
          </section>

          <!-- Seccion Frecuencia Compacta -->
          <section
            class="flex items-center justify-between gap-4 bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm"
          >
            <div class="flex flex-col">
              <span
                class="text-xs font-bold uppercase tracking-widest text-slate-400"
                >Frecuencia</span
              >
              <span class="text-sm text-slate-500 font-medium"
                >Repeticiones</span
              >
            </div>
            <div class="flex items-center gap-6">
              <button
                id="btn-minus"
                class="freq-btn w-12 h-12 md:w-14 md:h-14 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100 text-slate-600 hover:bg-white transition-all"
              >
                <i data-lucide="minus"></i>
              </button>
              <span
                id="display-frecuencia"
                class="text-4xl md:text-5xl font-black text-slate-800 tabular-nums"
                >1</span
              >
              <button
                id="btn-plus"
                class="freq-btn w-12 h-12 md:w-14 md:h-14 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100 text-slate-600 hover:bg-white transition-all"
              >
                <i data-lucide="plus"></i>
              </button>
            </div>
          </section>
        </div>

        <!-- Derecha: Foto -->
        <div class="space-y-8 mt-8 md:mt-0">
          <section class="space-y-4">
            <label
              class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1"
              >Evidencia & IA</label
            >

            <input
              type="file"
              id="input-foto"
              accept="image/*"
              capture="environment"
              class="hidden"
            />

            <div
              id="foto-container"
              onclick="document.getElementById('input-foto').click()"
              class="relative w-full aspect-square md:aspect-[4/3] bg-white border-2 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center overflow-hidden transition-all hover:border-indigo-300 hover:bg-indigo-50/10 group cursor-pointer shadow-sm"
            >
              <!-- Placeholder State -->
              <div id="foto-empty" class="flex flex-col items-center gap-4">
                <div
                  class="w-20 h-20 bg-indigo-50 rounded-[2rem] flex items-center justify-center text-indigo-500 group-hover:bg-indigo-100 transition-colors"
                >
                  <i data-lucide="camera" size="32"></i>
                </div>
                <div class="text-center p-4">
                  <p class="font-bold text-slate-700 text-lg">
                    Subir o Capturar Foto
                  </p>
                  <p class="text-sm text-slate-400 max-w-[200px]">
                    La IA analizará automáticamente si existe alguna lesión
                  </p>
                </div>
              </div>

              <!-- Preview State -->
              <img
                id="preview-img"
                class="hidden absolute inset-0 w-full h-full object-cover"
              />

              <div id="foto-overlay" class="hidden absolute top-6 right-6 z-10">
                <button
                  onclick="
                    event.stopPropagation();
                    quitarFoto();
                  "
                  class="w-12 h-12 bg-white shadow-xl rounded-2xl flex items-center justify-center text-rose-500 hover:bg-rose-50 transition-colors"
                >
                  <i data-lucide="x" size="20"></i>
                </button>
              </div>

              <div id="foto-status" class="hidden absolute bottom-8 inset-x-8">
                <div
                  class="glass py-3 px-6 rounded-2xl flex items-center justify-center gap-3 text-xs font-bold uppercase tracking-widest text-indigo-600 border border-indigo-100 shadow-xl"
                >
                  <i data-lucide="check" size="14"></i>
                  <span>Evidencia Lista</span>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Boton Enviar -->
        <div
          class="fixed bottom-0 left-0 right-0 p-6 md:static md:p-0 md:mt-10 submit-bar bg-gradient-to-t from-slate-50 md:from-transparent pointer-events-none md:pointer-events-auto"
        >
          <button
            id="btn-guardar"
            class="pointer-events-auto w-full max-w-md md:max-w-none mx-auto py-6 rounded-[2.5rem] bg-slate-900 text-white font-bold text-xl flex items-center justify-center gap-4 shadow-2xl shadow-indigo-200 active:scale-95 transition-all disabled:opacity-50"
          >
            <i data-lucide="send" id="icon-save" size="24"></i>
            <span id="text-save">Enviar Registro al Cloud</span>
          </button>
        </div>
      </div>
    </main>

    <script>
      // ============================================================
      // CONFIGURACIÓN Y SEGURIDAD
      // ============================================================
      const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxa43UT868Pah4wWH4miBZzObcONUOTbt5QvQs6omy3wAmloHhZLdEl_PZ8s0JWSb8f0Q/exec";
      
      // Función reutilizable y escalable para de-ofuscar contraseñas o claves
      // Recibe la clave ofuscada y un array de reglas (falso vs real)
      function revelarClave(claveOculta, reglasDeReemplazo) {
        let claveRevelada = claveOculta;
        // Usamos split().join() como una alternativa segura e infalible
        // para reemplazar todas las ocurrencias exactas (respeta mayúsculas/minúsculas)
        reglasDeReemplazo.forEach(regla => {
          claveRevelada = claveRevelada.split(regla.falso).join(regla.real);
        });
        return claveRevelada;
      }

      // La API Key con los caracteres intencionalmente alterados
      const API_KEY_OFUSCADA = "XIzxSyColMXbD8QePotZSN>COjqi-wItZadEZRM";
      
      // Revelamos la API Key en memoria en tiempo de ejecución
      const GEMINI_API_KEY = revelarClave(API_KEY_OFUSCADA, [
        { falso: 'X', real: 'A' }, // Control estricto de mayúscula
        { falso: 'x', real: 'a' }, // Control estricto de minúscula
        { falso: '8', real: '3' },
        { falso: '>', real: 'v' }
      ]);
      
      const GEMINI_MODEL = "gemini-3-flash-preview";

      // ============================================================
      // ESTADO
      // ============================================================
      let antecedenteSeleccionado = "";
      let tiempoSeleccionado = "";
      let frecuencia = 1;
      let selectedFile = null;
      let isRecording = false;
      let recognition = null;

      const opcionesAntecedentes = ["Ansiedad", "Aburrimiento", "Estrés", "Otro"];
      const opcionesTiempo = ["< 1 min", "1 - 3 min", "3 - 5 min", "> 5 min"];

      // ============================================================
      // SELECTORES
      // ============================================================
      const gridAntecedentes = document.getElementById("grid-antecedentes");
      const headerAntecedentes = document.getElementById("header-antecedentes");
      const panelOtro = document.getElementById("panel-otro");
      const inputOtro = document.getElementById("input-otro-antecedente");
      const gridTiempos = document.getElementById("grid-tiempos");
      const displayFrecuencia = document.getElementById("display-frecuencia");
      const btnGuardar = document.getElementById("btn-guardar");
      const textSave = document.getElementById("text-save");
      const btnMicNativo = document.getElementById("btn-mic-nativo");
      const micText = document.getElementById("mic-text");
      const inputFoto = document.getElementById("input-foto");
      const fotoEmpty = document.getElementById("foto-empty");
      const fotoOverlay = document.getElementById("foto-overlay");
      const fotoStatus = document.getElementById("foto-status");
      const previewImg = document.getElementById("preview-img");

      // ============================================================
      // INICIALIZACIÓN
      // ============================================================
      function init() {
        renderOptions();
        lucide.createIcons();
        initSpeechRecognition();
      }

      function initSpeechRecognition() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'es-ES';

          recognition.onstart = () => {
            isRecording = true;
            btnMicNativo.classList.add("mic-active");
            micText.innerText = "Dictando...";
            inputOtro.placeholder = "Habla ahora, te escucho...";
          };

          recognition.onresult = (event) => {
            let finalTranscript = '';
            // Combinar todos los resultados que han ingresado
            for (let i = 0; i < event.results.length; ++i) {
                finalTranscript += event.results[i][0].transcript;
            }
            inputOtro.value = finalTranscript;
          };

          recognition.onerror = (event) => {
            console.error("Error Speech Recognition:", event.error);
            stopDictado(false);
            if (event.error === 'not-allowed') {
                alert("Debes permitir el acceso al micrófono en el navegador.");
            }
          };

          recognition.onend = () => {
            stopDictado(false);
          };
        } else {
            console.warn("Web Speech API no soportada en este navegador.");
        }
      }

      function renderOptions() {
        gridAntecedentes.innerHTML = opcionesAntecedentes.map(val => `
          <button type="button" onclick="seleccionarAntecedente('${val}')" class="btn-option p-4 md:p-5 rounded-2xl md:rounded-3xl bg-white border border-slate-200 text-sm md:text-base font-semibold text-slate-600 shadow-sm" data-val="${val}">
            ${val}
          </button>
        `).join("");

        gridTiempos.innerHTML = opcionesTiempo.map(val => `
          <button type="button" onclick="seleccionarTiempo('${val}')" class="btn-option p-4 md:p-5 rounded-2xl md:rounded-3xl bg-white border border-slate-200 text-sm md:text-base font-semibold text-slate-600 shadow-sm" data-val="${val}">
            ${val}
          </button>
        `).join("");
      }

      window.seleccionarAntecedente = (val) => {
        antecedenteSeleccionado = val;
        
        // Colorear opciones
        document.querySelectorAll("#grid-antecedentes .btn-option").forEach(btn => {
          btn.className = `btn-option p-4 md:p-5 rounded-2xl md:rounded-3xl border text-sm md:text-base font-semibold shadow-sm ${btn.dataset.val === val ? 'active-option' : 'bg-white border-slate-200 text-slate-600'}`;
        });

        // Alternar vistas si es "Otro"
        if (val === "Otro") {
          gridAntecedentes.classList.add("hidden");
          headerAntecedentes.classList.add("hidden");
          panelOtro.classList.remove("hidden");
          panelOtro.classList.add("flex");
          inputOtro.focus();
        }
      };

      window.cerrarOtro = () => {
        // Detener dictado si está activo
        stopDictado();
        
        // Volver la interfaz al estado normal
        antecedenteSeleccionado = "";
        gridAntecedentes.classList.remove("hidden");
        headerAntecedentes.classList.remove("hidden");
        panelOtro.classList.add("hidden");
        panelOtro.classList.remove("flex");
        inputOtro.value = "";
        
        // Deseleccionar botones
        document.querySelectorAll("#grid-antecedentes .btn-option").forEach(btn => {
          btn.className = `btn-option p-4 md:p-5 rounded-2xl md:rounded-3xl border text-sm md:text-base font-semibold shadow-sm bg-white border-slate-200 text-slate-600`;
        });
      };

      window.seleccionarTiempo = (val) => {
        tiempoSeleccionado = val;
        document.querySelectorAll("#grid-tiempos .btn-option").forEach(btn => {
          btn.className = `btn-option p-4 md:p-5 rounded-2xl md:rounded-3xl border text-sm md:text-base font-semibold shadow-sm ${btn.dataset.val === val ? 'active-option' : 'bg-white border-slate-200 text-slate-600'}`;
        });
      };

      document.getElementById("btn-plus").onclick = () => { frecuencia++; updateFreq(); };
      document.getElementById("btn-minus").onclick = () => { if (frecuencia > 1) frecuencia--; updateFreq(); };
      function updateFreq() { displayFrecuencia.innerText = frecuencia; }

      // ============================================================
      // VOZ: DICTADO NATIVO (WEB SPEECH)
      // ============================================================
      window.toggleDictado = () => {
        if (!recognition) {
            alert("El dictado por voz no es compatible con este navegador.");
            return;
        }

        if (isRecording) {
            stopDictado();
        } else {
            // Limpiar input al iniciar nuevo dictado
            inputOtro.value = "";
            try {
                recognition.start();
            } catch (e) {
                // Si la instancia ya estaba corriendo o hay un error de estado
                console.error("No se pudo iniciar reconocimiento", e);
            }
        }
      };

      function stopDictado(forceStop = true) {
          if (forceStop && recognition) {
              try { recognition.stop(); } catch(e){}
          }
          isRecording = false;
          btnMicNativo.classList.remove("mic-active");
          micText.innerText = "Toca para dictar";
          inputOtro.placeholder = "Escuchando o escribe aquí...";
      }

      // ============================================================
      // MANEJO DE FOTO
      // ============================================================
      inputFoto.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        previewImg.src = URL.createObjectURL(file);
        previewImg.classList.remove("hidden");
        fotoEmpty.classList.add("hidden");
        fotoOverlay.classList.remove("hidden");
        fotoStatus.classList.remove("hidden");
      };

      window.quitarFoto = () => {
        selectedFile = null;
        previewImg.classList.add("hidden");
        fotoEmpty.classList.remove("hidden");
        fotoOverlay.classList.add("hidden");
        fotoStatus.classList.add("hidden");
        inputFoto.value = "";
      };

      // ============================================================
      // IA: FILES API (SOLO PARA LA FOTO)
      // ============================================================
      async function analizarConGemini(file, conducta) {
        try {
          console.log("=== INICIANDO SUBIDA A GEMINI FILES API ===");
          console.log("Archivo seleccionado:", file.name, "MIME:", file.type, "Tamaño:", file.size);

          // 1. Iniciar sesión resumable
          const startRes = await fetch(
            `https://generativelanguage.googleapis.com/upload/v1beta/files?key=${GEMINI_API_KEY}`,
            {
              method: "POST",
              headers: {
                "X-Goog-Upload-Protocol": "resumable",
                "X-Goog-Upload-Command": "start",
                "X-Goog-Upload-Header-Content-Length": String(file.size), // Asegurar que sea string
                "X-Goog-Upload-Header-Content-Type": file.type,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                file: { display_name: "img_" + Date.now() },
              }),
            },
          );

          if (!startRes.ok) {
            const errText = await startRes.text();
            console.error("ERROR EN PASO 1:", startRes.status, errText);
            throw new Error(`Paso 1 falló: ${startRes.status} - ${errText}`);
          }
          const uploadUrl = startRes.headers.get("x-goog-upload-url");
          console.log("Paso 1 Exitoso. URL de subida obtenida:", uploadUrl);

          // 2. Subir el archivo
          console.log("Subiendo datos binarios (Paso 2)...");
          const uploadRes = await fetch(uploadUrl, {
            method: "POST",
            headers: { 
              "X-Goog-Upload-Command": "upload, finalize",
              "X-Goog-Upload-Offset": "0" 
            },
            body: file,
          });

          if (!uploadRes.ok) {
            const errText = await uploadRes.text();
            console.error("ERROR EN PASO 2:", uploadRes.status, errText);
            throw new Error(`Paso 2 (SUBIDA) falló: ${uploadRes.status} - ${errText}`);
          }
          const fileInfo = await uploadRes.json();
          console.log("Paso 2 Exitoso. Info del archivo:", fileInfo);

          // 3. Análisis
          console.log("Iniciando análisis (Paso 3) con modelo:", GEMINI_MODEL);
          const analysisRes = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: `Analiza si hay una lesión física visible en esta imagen relacionada con: '${conducta}'. Responde solo SÍ o NO seguido de una breve razón.`,
                      },
                      {
                        file_data: {
                          mime_type: file.type,
                          file_uri: fileInfo.file.uri,
                        },
                      },
                    ],
                  },
                ],
                generationConfig: { temperature: 0 },
              }),
            },
          );

          if (!analysisRes.ok) {
            const errText = await analysisRes.text();
            console.error("ERROR EN PASO 3:", analysisRes.status, errText);
            throw new Error(`Paso 3 (Análisis) falló: ${analysisRes.status} - ${errText}`);
          }

          const data = await analysisRes.json();
          const resText = data.candidates[0].content.parts[0].text.trim();
          console.log("Respuesta completa de IA:", resText);
          
          return resText.toLowerCase().includes("sí") || resText.toLowerCase().includes("si") ? "Sí" : "No";
        } catch (e) {
          console.error("DEBUG ERROR IA:", e);
          return "ERROR: " + e.message;
        }
      }

      // ============================================================
      // GUARDAR
      // ============================================================
      btnGuardar.onclick = async () => {
        const conducta = document.getElementById("input-conducta").value;
        const ant = antecedenteSeleccionado === "Otro" ? inputOtro.value.trim() : antecedenteSeleccionado;

        if (!conducta || !ant || !tiempoSeleccionado)
          return alert("Datos incompletos. Asegúrate de escribir o dictar un antecedente.");

        btnGuardar.disabled = true;
        textSave.innerText = "Procesando...";

        const fechaAuto = new Date().toLocaleString("es-CO", {
          day: "2-digit", month: "2-digit", year: "numeric",
          hour: "2-digit", minute: "2-digit", second: "2-digit"
        });

        try {
          const lesion = selectedFile 
            ? await analizarConGemini(selectedFile, conducta)
            : "Sin foto";

          if (lesion.startsWith("ERROR")) {
            alert("❌ FALLÓ EL PROCESO DE IA FOTO:\n" + lesion);
            btnGuardar.disabled = false;
            textSave.innerText = "Reintentar Envío";
            return; 
          }

          const params = new URLSearchParams();
          params.append("fecha", fechaAuto);
          params.append("conducta", conducta);
          params.append("antecedente", ant);
          params.append("tiempo", tiempoSeleccionado);
          params.append("frecuencia", frecuencia);
          params.append("lesion", lesion);

          await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            body: params,
            mode: "no-cors",
          });

          textSave.innerText = "¡Registro Guardado!";
          btnGuardar.classList.replace("bg-slate-900", "bg-emerald-500");
          setTimeout(() => location.reload(), 1500);

        } catch (e) {
          alert("Error crítico de sistema: " + e.message);
          btnGuardar.disabled = false;
          textSave.innerText = "Reintentar";
        }
      };

      init();
    </script>
  </body>
</html>
